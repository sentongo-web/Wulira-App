name: wulira
description: "Learn Luganda - Uganda's most spoken local language"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^14.0.0

  # Local storage
  shared_preferences: ^2.3.0
  sqflite: ^2.3.3
  path: ^1.9.0
  flutter_secure_storage: ^9.2.2

  # Payments
  webview_flutter: ^4.10.0
  http: ^1.2.2
  crypto: ^3.0.3

  # Audio
  audioplayers: ^6.1.0
  flutter_tts: ^4.2.0

  # UI
  lottie: ^3.1.0
  flutter_svg: ^2.0.10
  cached_network_image: ^3.4.0

  # State management
  provider: ^6.1.2

  # Utils
  intl: ^0.19.0
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/images/
    - assets/data/
